version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3 # Образ Postgres 15 + PostGIS
    container_name: network_db
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=network_design
    ports:
      - "5432:5432" # Пробрасываем порт: из системы стучимся в localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: